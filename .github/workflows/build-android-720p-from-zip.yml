
name: Build Android 720p CrashFix

on:
  workflow_dispatch:
    inputs:
      source_zip:
        description: "Nom exact du ZIP Android"
        required: true
        default: "WiiUStream-Android-Client-v0.3.1-720p-crashfix.zip"

  push:
    paths:
      - "WiiUStream-Android-Client-v0.3.1-720p-crashfix.zip"
      - ".github/workflows/build-android-720p-from-zip.yml"

permissions:
  contents: read

jobs:
  build-android:
    name: Compiler APK Android
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Télécharger le dépôt
        uses: actions/checkout@v5

      - name: Vérifier et décompresser le ZIP
        id: source
        shell: bash
        env:
          SOURCE_ZIP: ${{ inputs.source_zip }}
        run: |
          set -euo pipefail

          zip_file="${SOURCE_ZIP:-WiiUStream-Android-Client-v0.3.1-720p-crashfix.zip}"

          echo "ZIP demandé : $zip_file"

          if [[ ! -f "$zip_file" ]]; then
            echo "::error::Le fichier ZIP est introuvable : $zip_file"
            echo "ZIP disponibles dans le dépôt :"
            find . -maxdepth 3 -type f -iname "*.zip" -print
            exit 1
          fi

          extract_dir="$RUNNER_TEMP/wiiustream-android"

          rm -rf "$extract_dir"
          mkdir -p "$extract_dir"

          unzip -q "$zip_file" -d "$extract_dir"

          echo "Contenu décompressé :"
          find "$extract_dir" -maxdepth 4 -type f | sort

          mapfile -t settings_files < <(
            find "$extract_dir" \
              -type f \
              \( -name "settings.gradle.kts" -o -name "settings.gradle" \) \
              -print
          )

          if (( ${#settings_files[@]} == 0 )); then
            echo "::error::Aucun fichier settings.gradle ou settings.gradle.kts trouvé."
            exit 1
          fi

          if (( ${#settings_files[@]} > 1 )); then
            echo "::error::Plusieurs projets Gradle ont été trouvés :"
            printf ' - %s\n' "${settings_files[@]}"
            exit 1
          fi

          project_dir="$(dirname "${settings_files[0]}")"

          if [[ ! -f "$project_dir/app/build.gradle.kts" && \
                ! -f "$project_dir/app/build.gradle" ]]; then
            echo "::error::Le module Android app est introuvable."
            exit 1
          fi

          project_dir="$(realpath "$project_dir")"

          echo "Projet Android détecté : $project_dir"

          {
            echo "project_dir=$project_dir"
            echo "zip_file=$zip_file"
          } >> "$GITHUB_OUTPUT"

      - name: Installer Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Installer le SDK Android
        uses: android-actions/setup-android@v4
        with:
          packages: >-
            platform-tools
            platforms;android-36
            build-tools;36.0.0

      - name: Installer Gradle 9.4.1
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "9.4.1"

      - name: Afficher les versions installées
        shell: bash
        run: |
          set -euo pipefail

          java -version
          gradle --version
          sdkmanager --list_installed

      - name: Compiler l’APK debug
        shell: bash
        env:
          PROJECT_DIR: ${{ steps.source.outputs.project_dir }}
        run: |
          set -euo pipefail

          echo "Compilation dans : $PROJECT_DIR"

          if [[ -f "$PROJECT_DIR/gradlew" ]]; then
            chmod +x "$PROJECT_DIR/gradlew"

            "$PROJECT_DIR/gradlew" \
              --no-daemon \
              --stacktrace \
              --warning-mode all \
              -p "$PROJECT_DIR" \
              clean \
              assembleDebug
          else
            gradle \
              --no-daemon \
              --stacktrace \
              --warning-mode all \
              --project-dir "$PROJECT_DIR" \
              clean \
              assembleDebug
          fi

      - name: Trouver l’APK généré
        id: apk
        shell: bash
        env:
          PROJECT_DIR: ${{ steps.source.outputs.project_dir }}
        run: |
          set -euo pipefail

          echo "Recherche des APK dans : $PROJECT_DIR"

          mapfile -t debug_apks < <(
            find "$PROJECT_DIR/app/build/outputs/apk/debug" \
              -type f \
              -name "*.apk" \
              -print 2>/dev/null
          )

          if (( ${#debug_apks[@]} == 0 )); then
            echo "Aucun APK dans le dossier debug, recherche générale..."

            mapfile -t debug_apks < <(
              find "$PROJECT_DIR" \
                -type f \
                -name "*.apk" \
                -print
            )
          fi

          if (( ${#debug_apks[@]} == 0 )); then
            echo "::error::La compilation n’a produit aucun APK."

            echo "Fichiers présents dans les dossiers build :"
            find "$PROJECT_DIR" \
              -path "*/build/*" \
              -type f \
              -print 2>/dev/null \
              | sort \
              || true

            exit 1
          fi

          echo "APK trouvés :"
          printf ' - %s\n' "${debug_apks[@]}"

          selected_apk="${debug_apks[0]}"

          rm -rf "$GITHUB_WORKSPACE/dist"
          mkdir -p "$GITHUB_WORKSPACE/dist"

          output_apk="$GITHUB_WORKSPACE/dist/WiiUStream-Android-720p-CrashFix.apk"

          cp "$selected_apk" "$output_apk"

          sha256sum "$output_apk" \
            > "$GITHUB_WORKSPACE/dist/WiiUStream-Android-720p-CrashFix.apk.sha256"

          {
            echo "apk_path=$output_apk"
            echo "dist_dir=$GITHUB_WORKSPACE/dist"
          } >> "$GITHUB_OUTPUT"

          echo "APK final :"
          ls -lh "$GITHUB_WORKSPACE/dist"

      - name: Vérifier le fichier APK
        shell: bash
        run: |
          set -euo pipefail

          apk="dist/WiiUStream-Android-720p-CrashFix.apk"

          if [[ ! -s "$apk" ]]; then
            echo "::error::L’APK est absent ou vide."
            exit 1
          fi

          file "$apk"
          ls -lh "$apk"

      - name: Mettre l’APK en téléchargement
        uses: actions/upload-artifact@v4
        with:
          name: WiiUStream-Android-720p-CrashFix
          path: |
            dist/WiiUStream-Android-720p-CrashFix.apk
            dist/WiiUStream-Android-720p-CrashFix.apk.sha256
          if-no-files-found: error
          retention-days: 30
          compression-level: 6
