name: Build Android 720p client from ZIP

on:
  workflow_dispatch:
    inputs:
      source_zip:
        description: "Nom du ZIP Android"
        required: false
        default: "WiiUStream-Android-Client-v0.3.0-720p-low-latency.zip"

  push:
    paths:
      - "*.zip"
      - ".github/workflows/build-android-720p-from-zip.yml"

permissions:
  contents: read

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Télécharger le dépôt
        uses: actions/checkout@v4

      - name: Trouver et décompresser le ZIP Android
        id: source
        shell: bash
        env:
          REQUESTED_ZIP: ${{ inputs.source_zip }}
        run: |
          set -euo pipefail

          requested="${REQUESTED_ZIP:-}"
          candidates=()

          if [[ -n "$requested" && -f "$requested" ]]; then
            candidates+=("$requested")
          else
            while IFS= read -r -d '' archive; do
              listing="$(unzip -Z1 "$archive" 2>/dev/null || true)"

              has_settings=false
              has_app_gradle=false

              if grep -Eq '(^|/)settings\.gradle(\.kts)?$' <<<"$listing"; then
                has_settings=true
              fi

              if grep -Eq '(^|/)app/build\.gradle(\.kts)?$' <<<"$listing"; then
                has_app_gradle=true
              fi

              if [[ "$has_settings" == true && "$has_app_gradle" == true ]]; then
                candidates+=("$archive")
              fi
            done < <(
              find . \
                -maxdepth 3 \
                -type f \
                -iname '*.zip' \
                -print0
            )
          fi

          if (( ${#candidates[@]} == 0 )); then
            echo "::error::Aucun ZIP Android compatible n'a été trouvé."

            echo "ZIP présents :"

            find . \
              -maxdepth 3 \
              -type f \
              -iname '*.zip' \
              -print

            exit 1
          fi

          if (( ${#candidates[@]} > 1 )); then
            echo "::error::Plusieurs ZIP Android ont été trouvés."
            echo "::error::Indique le nom exact dans le champ source_zip."

            printf ' - %s\n' "${candidates[@]}"

            exit 1
          fi

          archive="${candidates[0]}"

          echo "ZIP sélectionné : $archive"

          rm -rf extracted-android
          mkdir -p extracted-android

          unzip -q "$archive" -d extracted-android

          roots=()

          while IFS= read -r -d '' settings_file; do
            root="$(dirname "$settings_file")"

            if [[ -f "$root/app/build.gradle.kts" || \
                  -f "$root/app/build.gradle" ]]; then
              roots+=("$root")
            fi
          done < <(
            find extracted-android \
              -type f \
              \( -name settings.gradle.kts -o -name settings.gradle \) \
              -print0
          )

          if (( ${#roots[@]} == 0 )); then
            echo "::error::Le dossier principal du projet Android n'a pas été trouvé."

            find extracted-android \
              -maxdepth 5 \
              -type f \
              | sort

            exit 1
          fi

          if (( ${#roots[@]} > 1 )); then
            echo "::error::Plusieurs projets Android ont été détectés."

            printf ' - %s\n' "${roots[@]}"

            exit 1
          fi

          project_dir="$(realpath "${roots[0]}")"

          echo "project_dir=$project_dir" >> "$GITHUB_OUTPUT"
          echo "archive=$archive" >> "$GITHUB_OUTPUT"

          echo "Projet Android détecté : $project_dir"

      - name: Installer Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Installer le SDK Android
        uses: android-actions/setup-android@v3

      - name: Accepter les licences Android
        shell: bash
        run: |
          yes | sdkmanager --licenses >/dev/null 2>&1 || true

      - name: Installer les composants Android
        shell: bash
        run: |
          sdkmanager \
            "platform-tools" \
            "platforms;android-36" \
            "build-tools;36.0.0"

      - name: Installer Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "9.4.1"

      - name: Afficher la structure du projet
        shell: bash
        run: |
          project="${{ steps.source.outputs.project_dir }}"

          echo "Projet : $project"

          find "$project" \
            -maxdepth 3 \
            -type f \
            | sort

      - name: Compiler l’APK Android
        shell: bash
        run: |
          set -euo pipefail

          project="${{ steps.source.outputs.project_dir }}"

          if [[ -f "$project/gradlew" ]]; then
            chmod +x "$project/gradlew"

            "$project/gradlew" \
              --no-daemon \
              --stacktrace \
              -p "$project" \
              clean \
              assembleDebug
          else
            gradle \
              --no-daemon \
              --stacktrace \
              --project-dir "$project" \
              clean \
              assembleDebug
          fi

      - name: Rechercher et copier l’APK
        id: apk
        shell: bash
        run: |
          set -euo pipefail

          project="${{ steps.source.outputs.project_dir }}"

          echo "Recherche des APK dans : $project"

          mapfile -t apks < <(
            find "$project" \
              -type f \
              -name '*.apk' \
              -print
          )

          if (( ${#apks[@]} == 0 )); then
            echo "::error::Aucun fichier APK n'a été produit."

            echo "Contenu du dossier build :"

            find "$project" \
              -path '*/build/*' \
              -type f \
              -print \
              2>/dev/null \
              | sort \
              || true

            exit 1
          fi

          echo "APK trouvés :"

          printf ' - %s\n' "${apks[@]}"

          selected_apk=""

          for apk_file in "${apks[@]}"; do
            if [[ "$apk_file" == *"/outputs/apk/debug/"* ]]; then
              selected_apk="$apk_file"
              break
            fi
          done

          if [[ -z "$selected_apk" ]]; then
            selected_apk="${apks[0]}"
          fi

          echo "APK sélectionné : $selected_apk"

          rm -rf "$GITHUB_WORKSPACE/dist"
          mkdir -p "$GITHUB_WORKSPACE/dist"

          cp "$selected_apk" \
            "$GITHUB_WORKSPACE/dist/WiiUStream-Android-720p-debug.apk"

          sha256sum \
            "$GITHUB_WORKSPACE/dist/WiiUStream-Android-720p-debug.apk" \
            > "$GITHUB_WORKSPACE/dist/WiiUStream-Android-720p-debug.apk.sha256"

          echo "apk_path=$GITHUB_WORKSPACE/dist/WiiUStream-Android-720p-debug.apk" \
            >> "$GITHUB_OUTPUT"

          ls -lh "$GITHUB_WORKSPACE/dist"

      - name: Vérifier que l’APK existe
        shell: bash
        run: |
          set -euo pipefail

          test -f \
            "$GITHUB_WORKSPACE/dist/WiiUStream-Android-720p-debug.apk"

          file \
            "$GITHUB_WORKSPACE/dist/WiiUStream-Android-720p-debug.apk"

          ls -lh \
            "$GITHUB_WORKSPACE/dist/WiiUStream-Android-720p-debug.apk"

      - name: Mettre l’APK en téléchargement
        uses: actions/upload-artifact@v4
        with:
          name: WiiUStream-Android-720p
          path: |
            dist/WiiUStream-Android-720p-debug.apk
            dist/WiiUStream-Android-720p-debug.apk.sha256
          if-no-files-found: error
          retention-days: 30
          compression-level: 6

         
