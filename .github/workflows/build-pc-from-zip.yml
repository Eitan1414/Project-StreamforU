name: Build PC client from ZIP

on:
  workflow_dispatch:
    inputs:
      source_zip:
        description: "Nom du ZIP du client PC (vide = détection automatique)"
        required: false
        default: "WiiUStream-PC-Client-v0.1.0.zip"

  push:
    paths:
      - "*.zip"
      - ".github/workflows/build-pc-from-zip.yml"

permissions:
  contents: read

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Télécharger le dépôt
        uses: actions/checkout@v5

      - name: Installer Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Trouver et décompresser le ZIP du client PC
        id: source
        shell: pwsh
        env:
          REQUESTED_ZIP: ${{ inputs.source_zip }}
        run: |
          $ErrorActionPreference = "Stop"

          $requested = $env:REQUESTED_ZIP
          $candidates = @()

          if ($requested -and (Test-Path -LiteralPath $requested)) {
            $candidates += (Resolve-Path -LiteralPath $requested).Path
          }
          else {
            $archives = Get-ChildItem -Path . -Filter *.zip -File -Recurse |
              Where-Object {
                $_.FullName.Split([IO.Path]::DirectorySeparatorChar).Count -le (
                  (Get-Location).Path.Split([IO.Path]::DirectorySeparatorChar).Count + 3
                )
              }

            foreach ($archive in $archives) {
              $entries = & tar -tf $archive.FullName 2>$null

              $hasMain = $entries |
                Where-Object { $_ -match '(^|/)main\.py$' }

              $hasRequirements = $entries |
                Where-Object { $_ -match '(^|/)requirements-build\.txt$' }

              $hasPackage = $entries |
                Where-Object { $_ -match '(^|/)wiiu_stream/protocol\.py$' }

              if ($hasMain -and $hasRequirements -and $hasPackage) {
                $candidates += $archive.FullName
              }
            }
          }

          if ($candidates.Count -eq 0) {
            Write-Error "Aucun ZIP du client PC n'a été trouvé."
          }

          if ($candidates.Count -gt 1) {
            Write-Host "Plusieurs ZIP compatibles ont été trouvés :"

            $candidates |
              ForEach-Object { Write-Host " - $_" }

            Write-Error "Renseigne le nom exact dans le champ source_zip."
          }

          $archive = $candidates[0]

          $extractRoot = Join-Path `
            $env:GITHUB_WORKSPACE `
            "extracted-pc"

          if (Test-Path $extractRoot) {
            Remove-Item $extractRoot -Recurse -Force
          }

          New-Item `
            -ItemType Directory `
            -Path $extractRoot |
            Out-Null

          Expand-Archive `
            -LiteralPath $archive `
            -DestinationPath $extractRoot `
            -Force

          $projects = Get-ChildItem `
            -Path $extractRoot `
            -Filter main.py `
            -File `
            -Recurse |
            Where-Object {
              Test-Path (
                Join-Path `
                  $_.Directory.FullName `
                  "requirements-build.txt"
              ) -and
              Test-Path (
                Join-Path `
                  $_.Directory.FullName `
                  "wiiu_stream\protocol.py"
              )
            }

          if ($projects.Count -ne 1) {
            Write-Host "Fichiers trouvés après extraction :"

            Get-ChildItem `
              $extractRoot `
              -File `
              -Recurse |
              Select-Object -ExpandProperty FullName

            Write-Error "Impossible d'identifier un unique projet PC."
          }

          $projectDir = $projects[0].Directory.FullName

          "project_dir=$projectDir" |
            Out-File `
              -FilePath $env:GITHUB_OUTPUT `
              -Encoding utf8 `
              -Append

          "archive=$archive" |
            Out-File `
              -FilePath $env:GITHUB_OUTPUT `
              -Encoding utf8 `
              -Append

          Write-Host "ZIP sélectionné : $archive"
          Write-Host "Projet détecté : $projectDir"

      - name: Installer les dépendances
        working-directory: ${{ steps.source.outputs.project_dir }}
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-build.txt

      - name: Tester le protocole
        working-directory: ${{ steps.source.outputs.project_dir }}
        run: |
          python -m unittest discover -s tests -v

      - name: Compiler l'exécutable Windows
        working-directory: ${{ steps.source.outputs.project_dir }}
        shell: pwsh
        run: |
          python -m PyInstaller `
            --noconfirm `
            --clean `
            --onefile `
            --windowed `
            --name WiiUStream-PC `
            --icon assets/wiiustream.ico `
            --hidden-import PIL._tkinter_finder `
            main.py

      - name: Créer la somme SHA-256
        working-directory: ${{ steps.source.outputs.project_dir }}
        shell: pwsh
        run: |
          $hash = (
            Get-FileHash `
              dist/WiiUStream-PC.exe `
              -Algorithm SHA256
          ).Hash.ToLower()

          "$hash  WiiUStream-PC.exe" |
            Out-File `
              -Encoding ascii `
              dist/WiiUStream-PC.exe.sha256

          Get-ChildItem dist

      - name: Mettre le client PC en téléchargement
        uses: actions/upload-artifact@v4
        with:
          name: WiiUStream-PC-Windows
          path: |
            ${{ steps.source.outputs.project_dir }}/dist/WiiUStream-PC.exe
            ${{ steps.source.outputs.project_dir }}/dist/WiiUStream-PC.exe.sha256
          if-no-files-found: error
          retention-days: 30
