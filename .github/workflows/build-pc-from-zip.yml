name: Build PC client from ZIP

on:
  workflow_dispatch:
    inputs:
      source_zip:
        description: "Nom du ZIP du client PC"
        required: false
        default: "WiiUStream-PC-Client-v0.1.0.zip"

  push:
    paths:
      - "*.zip"
      - ".github/workflows/build-pc-from-zip.yml"

permissions:
  contents: read

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Télécharger le dépôt
        uses: actions/checkout@v5

      - name: Installer Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Trouver et décompresser le ZIP du client PC
        id: source
        shell: pwsh
        env:
          REQUESTED_ZIP: ${{ inputs.source_zip }}
        run: |
          $ErrorActionPreference = "Stop"

          $requested = $env:REQUESTED_ZIP
          $candidates = @()

          if ($requested -and (Test-Path -LiteralPath $requested)) {
            $candidates += (Resolve-Path -LiteralPath $requested).Path
          }
          else {
            $archives = Get-ChildItem -Path . -Filter *.zip -File -Recurse

            foreach ($archive in $archives) {
              $entries = & tar -tf $archive.FullName 2>$null

              $hasMain = @(
                $entries |
                Where-Object { $_ -match '(^|/)main\.py$' }
              ).Count -gt 0

              $hasRequirements = @(
                $entries |
                Where-Object {
                  $_ -match '(^|/)requirements-build\.txt$'
                }
              ).Count -gt 0

              $hasProtocol = @(
                $entries |
                Where-Object {
                  $_ -match '(^|/)wiiu_stream/protocol\.py$'
                }
              ).Count -gt 0

              if ($hasMain -and $hasRequirements -and $hasProtocol) {
                $candidates += $archive.FullName
              }
            }
          }

          if ($candidates.Count -eq 0) {
            Write-Host "ZIP présents dans le dépôt :"

            Get-ChildItem -Path . -Filter *.zip -File -Recurse |
              Select-Object -ExpandProperty FullName

            throw "Aucun ZIP compatible avec le client PC n'a été trouvé."
          }

          if ($candidates.Count -gt 1) {
            Write-Host "Plusieurs ZIP compatibles ont été trouvés :"

            $candidates |
              ForEach-Object {
                Write-Host " - $_"
              }

            throw "Indique le nom exact du ZIP dans le champ source_zip."
          }

          $archive = $candidates[0]

          $extractRoot = Join-Path `
            $env:GITHUB_WORKSPACE `
            "extracted-pc"

          if (Test-Path -LiteralPath $extractRoot) {
            Remove-Item `
              -LiteralPath $extractRoot `
              -Recurse `
              -Force
          }

          New-Item `
            -ItemType Directory `
            -Path $extractRoot |
            Out-Null

          Expand-Archive `
            -LiteralPath $archive `
            -DestinationPath $extractRoot `
            -Force

          $projects = @(
            Get-ChildItem `
              -Path $extractRoot `
              -Filter main.py `
              -File `
              -Recurse |
            Where-Object {
              $projectRoot = $_.Directory.FullName

              $requirementsPath = Join-Path `
                $projectRoot `
                "requirements-build.txt"

              $protocolPath = Join-Path `
                $projectRoot `
                "wiiu_stream\protocol.py"

              $hasRequirements = Test-Path `
                -LiteralPath $requirementsPath

              $hasProtocol = Test-Path `
                -LiteralPath $protocolPath

              return ($hasRequirements -and $hasProtocol)
            }
          )

          if ($projects.Count -ne 1) {
            Write-Host "Fichiers trouvés après extraction :"

            Get-ChildItem `
              -Path $extractRoot `
              -File `
              -Recurse |
              Select-Object -ExpandProperty FullName

            throw "Impossible d'identifier un unique projet PC."
          }

          $projectDir = $projects[0].Directory.FullName

          "project_dir=$projectDir" |
            Out-File `
              -FilePath $env:GITHUB_OUTPUT `
              -Encoding utf8 `
              -Append

          "archive=$archive" |
            Out-File `
              -FilePath $env:GITHUB_OUTPUT `
              -Encoding utf8 `
              -Append

          Write-Host "ZIP sélectionné : $archive"
          Write-Host "Projet détecté : $projectDir"

      - name: Installer les dépendances
        working-directory: ${{ steps.source.outputs.project_dir }}
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-build.txt

      - name: Tester le protocole
        working-directory: ${{ steps.source.outputs.project_dir }}
        shell: pwsh
        run: |
          python -m unittest discover -s tests -v

      - name: Compiler l'exécutable Windows
        working-directory: ${{ steps.source.outputs.project_dir }}
        shell: pwsh
        run: |
          python -m PyInstaller `
            --noconfirm `
            --clean `
            --onefile `
            --windowed `
            --name WiiUStream-PC `
            --icon assets/wiiustream.ico `
            --hidden-import PIL._tkinter_finder `
            main.py

      - name: Créer la somme SHA-256
        working-directory: ${{ steps.source.outputs.project_dir }}
        shell: pwsh
        run: |
          $exe = "dist\WiiUStream-PC.exe"

          if (-not (Test-Path -LiteralPath $exe)) {
            throw "Le fichier WiiUStream-PC.exe n'a pas été produit."
          }

          $hash = (
            Get-FileHash `
              -LiteralPath $exe `
              -Algorithm SHA256
          ).Hash.ToLower()

          "$hash  WiiUStream-PC.exe" |
            Out-File `
              -Encoding ascii `
              "dist\WiiUStream-PC.exe.sha256"

          Get-ChildItem -Path dist

      - name: Mettre le client PC en téléchargement
        uses: actions/upload-artifact@v4
        with:
          name: WiiUStream-PC-Windows
          path: |
            ${{ steps.source.outputs.project_dir }}/dist/WiiUStream-PC.exe
            ${{ steps.source.outputs.project_dir }}/dist/WiiUStream-PC.exe.sha256
          if-no-files-found: error
          retention-days: 30
