name: Build Android 480p Stable client

on:
  workflow_dispatch:
    inputs:
      source_zip:
        description: "Nom exact du ZIP Android"
        required: true
        default: "WiiUStream-Android-Client-v0.4.0-480p-stable.zip"

  push:
    paths:
      - "WiiUStream-Android-Client-v0.4.0-480p-stable.zip"
      - ".github/workflows/build-android-480p-from-zip.yml"

permissions:
  contents: read

jobs:
  build-android:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Télécharger le dépôt
        uses: actions/checkout@v4

      - name: Vérifier et décompresser le ZIP
        id: source
        shell: bash
        env:
          SOURCE_ZIP: ${{ inputs.source_zip }}
        run: |
          set -euo pipefail

          zip_file="${SOURCE_ZIP:-WiiUStream-Android-Client-v0.4.0-480p-stable.zip}"

          if [[ ! -f "$zip_file" ]]; then
            echo "::error::ZIP introuvable : $zip_file"
            find . -maxdepth 3 -type f -iname '*.zip' -print
            exit 1
          fi

          extract_dir="$RUNNER_TEMP/wiiustream-android"
          rm -rf "$extract_dir"
          mkdir -p "$extract_dir"

          unzip -q "$zip_file" -d "$extract_dir"

          mapfile -t settings_files < <(
            find "$extract_dir" \
              -type f \
              \( -name settings.gradle.kts -o -name settings.gradle \) \
              -print
          )

          if (( ${#settings_files[@]} != 1 )); then
            echo "::error::Impossible d'identifier un unique projet Android."
            find "$extract_dir" -maxdepth 5 -type f | sort
            exit 1
          fi

          project_dir="$(dirname "${settings_files[0]}")"

          if [[ ! -f "$project_dir/app/build.gradle.kts" && \
                ! -f "$project_dir/app/build.gradle" ]]; then
            echo "::error::Module app introuvable."
            exit 1
          fi

          project_dir="$(realpath "$project_dir")"

          echo "project_dir=$project_dir" >> "$GITHUB_OUTPUT"
          echo "Projet détecté : $project_dir"

      - name: Installer Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Installer le SDK Android
        uses: android-actions/setup-android@v3

      - name: Installer Android 36
        shell: bash
        run: |
          yes | sdkmanager --licenses >/dev/null 2>&1 || true

          sdkmanager \
            "platform-tools" \
            "platforms;android-36" \
            "build-tools;36.0.0"

      - name: Installer Gradle 9.4.1
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "9.4.1"

      - name: Compiler l’APK debug
        shell: bash
        run: |
          set -euo pipefail

          project="${{ steps.source.outputs.project_dir }}"

          if [[ -f "$project/gradlew" ]]; then
            chmod +x "$project/gradlew"

            "$project/gradlew" \
              --no-daemon \
              --stacktrace \
              -p "$project" \
              clean \
              assembleDebug
          else
            gradle \
              --no-daemon \
              --stacktrace \
              --project-dir "$project" \
              clean \
              assembleDebug
          fi

      - name: Récupérer l’APK
        shell: bash
        run: |
          set -euo pipefail

          project="${{ steps.source.outputs.project_dir }}"

          apk="$(
            find "$project/app/build/outputs/apk" \
              -type f \
              -name '*-debug.apk' \
              -print \
              -quit
          )"

          if [[ -z "$apk" || ! -f "$apk" ]]; then
            echo "::error::Aucun APK debug n'a été produit."

            find "$project" \
              -path '*/build/*' \
              -type f \
              2>/dev/null \
              | sort \
              || true

            exit 1
          fi

          rm -rf dist
          mkdir -p dist

          cp "$apk" dist/WiiUStream-Android-480p-Stable.apk

          sha256sum dist/WiiUStream-Android-480p-Stable.apk \
            > dist/WiiUStream-Android-480p-Stable.apk.sha256

          ls -lh dist

      - name: Mettre l’APK en téléchargement
        uses: actions/upload-artifact@v4
        with:
          name: WiiUStream-Android-480p-Stable
          path: dist/
          if-no-files-found: error
          retention-days: 30
