name: Build Android client from ZIP

on:
  workflow_dispatch:
    inputs:
      source_zip:
        description: "Nom du ZIP Android"
        required: false
        default: "WiiUStream-Android-Client-v0.1.1-alpha.zip"

  push:
    paths:
      - "*.zip"
      - ".github/workflows/build-android-from-zip.yml"

permissions:
  contents: read

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Télécharger le dépôt
        uses: actions/checkout@v4

      - name: Trouver et décompresser le ZIP Android
        id: source
        shell: bash
        env:
          REQUESTED_ZIP: ${{ inputs.source_zip }}
        run: |
          set -euo pipefail

          requested="${REQUESTED_ZIP:-}"
          candidates=()

          if [[ -n "$requested" && -f "$requested" ]]; then
            candidates+=("$requested")
          else
            while IFS= read -r -d '' archive; do
              listing="$(unzip -Z1 "$archive" 2>/dev/null || true)"

              if grep -Eq '(^|/)settings\.gradle(\.kts)?$' <<<"$listing" && \
                 grep -Eq '(^|/)app/build\.gradle(\.kts)?$' <<<"$listing"; then
                candidates+=("$archive")
              fi
            done < <(
              find . \
                -maxdepth 3 \
                -type f \
                -iname '*.zip' \
                -print0
            )
          fi

          if (( ${#candidates[@]} == 0 )); then
            echo "::error::Aucun ZIP contenant un projet Android n'a été trouvé."
            echo "ZIP présents dans le dépôt :"
            find . -maxdepth 3 -type f -iname '*.zip' -print
            exit 1
          fi

          if (( ${#candidates[@]} > 1 )); then
            echo "::error::Plusieurs projets Android ont été trouvés."
            echo "Indique le nom exact du ZIP dans source_zip."
            printf ' - %s\n' "${candidates[@]}"
            exit 1
          fi

          archive="${candidates[0]}"

          echo "ZIP sélectionné : $archive"

          rm -rf extracted-android
          mkdir -p extracted-android

          unzip -q "$archive" -d extracted-android

          roots=()

          while IFS= read -r -d '' settings_file; do
            root="$(dirname "$settings_file")"

            if [[ -f "$root/app/build.gradle.kts" || \
                  -f "$root/app/build.gradle" ]]; then
              roots+=("$root")
            fi
          done < <(
            find extracted-android \
              -type f \
              \( -name settings.gradle.kts -o -name settings.gradle \) \
              -print0
          )

          if (( ${#roots[@]} == 0 )); then
            echo "::error::Le dossier principal du projet Android n'a pas été trouvé."
            find extracted-android -maxdepth 4 -type f | sort
            exit 1
          fi

          if (( ${#roots[@]} > 1 )); then
            echo "::error::Plusieurs dossiers de projet Android ont été détectés."
            printf ' - %s\n' "${roots[@]}"
            exit 1
          fi

          project_dir="$(realpath "${roots[0]}")"

          echo "project_dir=$project_dir" >> "$GITHUB_OUTPUT"
          echo "archive=$archive" >> "$GITHUB_OUTPUT"

          echo "Projet Android détecté : $project_dir"

      - name: Installer Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Installer le SDK Android
        uses: android-actions/setup-android@v3

      - name: Accepter les licences Android
        shell: bash
        run: |
          yes | sdkmanager --licenses >/dev/null 2>&1 || true

      - name: Installer les composants Android
        shell: bash
        run: |
          sdkmanager \
            "platform-tools" \
            "platforms;android-36" \
            "build-tools;36.0.0"

      - name: Installer Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "9.4.1"

      - name: Compiler l’application
        shell: bash
        run: |
          set -euo pipefail

          project="${{ steps.source.outputs.project_dir }}"

          if [[ -f "$project/gradlew" ]]; then
            chmod +x "$project/gradlew"

            "$project/gradlew" \
              --no-daemon \
              --stacktrace \
              -p "$project" \
              clean \
              assembleDebug
          else
            gradle \
              --no-daemon \
              --stacktrace \
              --project-dir "$project" \
              clean \
              assembleDebug
          fi

      - name: Récupérer l’APK
        shell: bash
        run: |
          set -euo pipefail

          project="${{ steps.source.outputs.project_dir }}"

          apk="$(
            find "$project/app/build/outputs/apk" \
              -type f \
              -name '*-debug.apk' \
              -print \
              -quit
          )"

          if [[ -z "$apk" || ! -f "$apk" ]]; then
            echo "::error::La compilation n'a produit aucun APK."
            find "$project/app/build" -type f 2>/dev/null | sort || true
            exit 1
          fi

          mkdir -p dist

          cp "$apk" dist/WiiUStream-Android-debug.apk

          sha256sum dist/WiiUStream-Android-debug.apk \
            > dist/WiiUStream-Android-debug.apk.sha256

          ls -lh dist

      - name: Mettre l’APK en téléchargement
        uses: actions/upload-artifact@v4
        with:
          name: WiiUStream-Android-debug
          path: dist/
          if-no-files-found: error
          retention-days: 30
